<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Icon/Lines Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <!-- Shadow filter for depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.35" />
    </filter>
  </defs>
  
  <!-- Rounded Base Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Inner Symbol Area -->
  <g transform="translate(96, 96) scale(13.33)" filter="url(#glow)">
    <!-- Horizontal splitting bars -->
    <line x1="4" y1="9" x2="20" y2="9" stroke="url(#accentGrad)" stroke-width="2.2" stroke-linecap="round" />
    <line x1="4" y1="15" x2="20" y2="15" stroke="url(#accentGrad)" stroke-width="2.2" stroke-linecap="round" />
    <!-- Vertical line markers -->
    <line x1="10" y1="3" x2="8" y2="21" stroke="#f8fafc" stroke-width="2.2" stroke-linecap="round" />
    <line x1="16" y1="3" x2="14" y2="21" stroke="#f8fafc" stroke-width="2.2" stroke-linecap="round" />
  </g>
</svg>
